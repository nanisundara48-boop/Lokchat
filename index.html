<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loknet - AI Agent (Secure)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .chat-container {
            scrollbar-width: thin;
            scrollbar-color: #334155 #0f172a;
        }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-track { background: #0f172a; }
        .chat-container::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }

        .bot-message {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-radius: 0 16px 16px 16px;
        }
        .user-message {
            background: linear-gradient(145deg, #3b82f6, #2563eb);
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
            border-radius: 16px 0 16px 16px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px; height: 8px; background-color: #94a3b8;
            border-radius: 50%; margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .pulse-icon { animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        /* Markdown Styles */
        .markdown-content p { margin-bottom: 0.5rem; }
        .markdown-content strong { color: #60a5fa; }
        .markdown-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.5rem; }
        .markdown-content code { background-color: #0f172a; padding: 2px 4px; border-radius: 4px; color: #a78bfa; font-family: monospace; }
        .markdown-content pre { background-color: #0f172a; padding: 10px; border-radius: 8px; overflow-x: auto; margin-top: 0.5rem; border: 1px solid #334155; }
    </style>
</head>
<body class="h-screen flex flex-col justify-center items-center p-4">

    <div class="w-full max-w-3xl h-[85vh] bg-slate-900 rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-slate-800">
        
        <div class="p-4 border-b border-slate-800 flex items-center justify-between bg-slate-900/80 backdrop-blur-sm z-10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center pulse-icon">
                    <i class="fa-solid fa-network-wired text-white text-sm"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg tracking-wide text-blue-400">Loknet</h1>
                    <p class="text-xs text-green-400 flex items-center gap-1">
                        <span class="w-2 h-2 rounded-full bg-green-500 inline-block"></span> Online (Encrypted)
                    </p>
                </div>
            </div>
        </div>

        <div id="chat-box" class="flex-1 p-6 overflow-y-auto chat-container space-y-6">
            <div class="flex items-start gap-3">
                <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700 flex-shrink-0">
                    <i class="fa-solid fa-robot text-blue-400 text-xs"></i>
                </div>
                <div class="bot-message p-4 text-sm text-slate-300 max-w-[80%] leading-relaxed">
                    Hello there! I am Loknet, your advanced AI assistant. All conversations are secured with AES-256 encryption.
                </div>
            </div>
        </div>

        <div class="p-4 bg-slate-900 border-t border-slate-800">
            <form id="chat-form" class="relative flex items-center">
                <input type="text" id="user-input" 
                    class="w-full bg-slate-800 text-white text-sm rounded-full py-3 pl-6 pr-14 focus:outline-none focus:ring-1 focus:ring-blue-500 border border-slate-700 placeholder-slate-500 transition-all shadow-inner"
                    placeholder="Type 'hey loknet' or ask me anything..." autocomplete="off">
                <button type="submit" class="absolute right-2 w-8 h-8 bg-blue-600 hover:bg-blue-500 rounded-full flex items-center justify-center text-white transition-colors shadow-lg">
                    <i class="fa-solid fa-paper-plane text-xs"></i>
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // ==========================================
        // 1. FIREBASE CONFIGURATION 
        // ==========================================
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            databaseURL: "YOUR_TRUECHAT_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            // Fill your actual details here
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ==========================================
        // 2. ENCRYPTION KEY & LOGIC (AES-256)
        // ==========================================
        const ENCRYPTION_KEY = "Loknet_TrueChat_Secure_Key_2026!@#"; // Keep this key safe

        function encryptData(text) {
            return CryptoJS.AES.encrypt(text, ENCRYPTION_KEY).toString();
        }

        // ==========================================
        // 3. GEMINI API CONFIGURATION
        // ==========================================
        // WARNING: Using API key in frontend is for testing only!
        const GEMINI_API_KEY ="AIzaSyDe0HS5hGITIJ93V2x4fXumDhIfPTRvO9c";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex gap-3 ${sender === 'user' ? 'justify-end' : 'items-start'}`;

            if (sender === 'user') {
                msgDiv.innerHTML = `
                    <div class="user-message p-3 text-sm text-white max-w-[80%] leading-relaxed">
                        ${text}
                    </div>
                `;
            } else {
                // Using marked.parse() to render Markdown to HTML
                const parsedText = marked.parse(text);
                msgDiv.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700 flex-shrink-0 mt-1">
                        <i class="fa-solid fa-robot text-blue-400 text-xs"></i>
                    </div>
                    <div class="bot-message p-4 text-sm text-slate-300 max-w-[80%] leading-relaxed markdown-content">
                        ${parsedText}
                    </div>
                `;
            }
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTyping() {
            const id = 'typing-' + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.id = id;
            typingDiv.className = 'flex items-start gap-3';
            typingDiv.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700 flex-shrink-0">
                    <i class="fa-solid fa-network-wired text-blue-400 text-xs"></i>
                </div>
                <div class="bot-message p-4 py-3 flex items-center">
                    <div class="typing-indicator"><span></span><span></span><span></span></div>
                </div>
            `;
            chatBox.appendChild(typingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        async function fetchLoknetResponse(userText) {
            if (userText.toLowerCase().trim() === "hey loknet") {
                return "Hello there!";
            }

            const systemPrompt = `You are Loknet, a highly advanced AI assistant. Never reveal you are Google or Gemini. Answer clearly and use markdown for formatting if needed: ${userText}`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemPrompt }] }]
                    })
                });

                if (!response.ok) throw new Error('API Request Failed');
                const data = await response.json();
                let aiResponse = data.candidates[0].content.parts[0].text;
                return aiResponse.replace(/Gemini/gi, 'Loknet').replace(/Google/gi, 'Loknet Labs');
            } catch (error) {
                return "My connection is currently interrupted. Please try again.";
            }
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';

            // ENCRYPT AND SAVE USER MESSAGE TO FIREBASE
            try {
                const encryptedUserText = encryptData(text);
                push(ref(db, 'loknet_chats'), {
                    sender: 'user',
                    message: encryptedUserText, // Saved as encrypted hash
                    timestamp: Date.now()
                });
            } catch(e) { console.log("Firebase setup pending"); }

            const typingId = showTyping();
            const aiResponse = await fetchLoknetResponse(text);
            document.getElementById(typingId).remove();
            
            appendMessage('bot', aiResponse);

            // ENCRYPT AND SAVE AI MESSAGE TO FIREBASE
            try {
                const encryptedAIText = encryptData(aiResponse);
                push(ref(db, 'loknet_chats'), {
                    sender: 'loknet',
                    message: encryptedAIText, // Saved as encrypted hash
                    timestamp: Date.now()
                });
            } catch(e) { console.log("Firebase setup pending"); }
        });
    </script>
</body>
</html>
