<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loknet | AI Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #111827; color: #f3f4f6; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .bot-bubble { background-color: #1f2937; border: 1px solid #374151; border-radius: 16px 16px 16px 4px; }
        .user-bubble { background-color: #2563eb; color: white; border-radius: 16px 16px 4px 16px; }
        .typing-dots span { display: inline-block; width: 6px; height: 6px; background-color: #9ca3af; border-radius: 50%; margin: 0 2px; animation: bounce 1.4s infinite ease-in-out both; }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .markdown-content p { margin-bottom: 0.5rem; line-height: 1.5; }
        .markdown-content p:last-child { margin-bottom: 0; }
        .markdown-content strong { color: #60a5fa; font-weight: 600; }
        .markdown-content code { background: #111827; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; color: #a78bfa;}
        .markdown-content pre { background: #030712; padding: 12px; border-radius: 8px; overflow-x: auto; margin-top: 8px;}
    </style>
</head>
<body>

    <header class="bg-[#1f2937] border-b border-gray-800 px-4 py-3 flex items-center justify-between sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i class="fa-solid fa-bolt text-white text-sm"></i>
            </div>
            <div>
                <h1 class="font-semibold text-base tracking-wide text-white">Loknet AI</h1>
                <p class="text-[11px] text-green-400 flex items-center gap-1 font-medium">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-500 inline-block animate-pulse"></span> Secure Connection
                </p>
            </div>
        </div>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-5 pb-24 w-full max-w-3xl mx-auto">
        <div class="flex items-end gap-2 w-full">
            <div class="w-7 h-7 rounded-full bg-gray-800 border border-gray-700 flex items-center justify-center flex-shrink-0 mb-1">
                <i class="fa-solid fa-robot text-blue-400 text-[10px]"></i>
            </div>
            <div class="bot-bubble p-3.5 text-[15px] text-gray-200 max-w-[85%] shadow-sm">
                Hello! I am Loknet. You can now send me text or upload images!
            </div>
        </div>
    </main>

    <div id="image-preview-container" class="hidden fixed bottom-[70px] w-full max-w-3xl mx-auto px-4 z-20">
        <div class="bg-[#374151] p-2 rounded-lg inline-flex items-center gap-3 border border-gray-600">
            <img id="preview-img" src="" class="h-12 w-12 object-cover rounded">
            <span class="text-xs text-gray-300" id="preview-name">image.jpg</span>
            <button id="remove-img-btn" class="text-red-400 hover:text-red-300 ml-2"><i class="fa-solid fa-times"></i></button>
        </div>
    </div>

    <footer class="bg-[#1f2937] border-t border-gray-800 p-3 fixed bottom-0 w-full z-30">
        <div class="max-w-3xl mx-auto relative flex items-center gap-2">
            
            <label for="file-upload" class="cursor-pointer p-3 bg-[#374151] rounded-full text-gray-400 hover:text-blue-400 transition">
                <i class="fa-solid fa-paperclip"></i>
            </label>
            <input id="file-upload" type="file" accept="image/*" class="hidden">

            <input type="text" id="user-input" 
                class="flex-1 bg-[#374151] text-white text-[15px] rounded-full py-3 px-5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all placeholder-gray-400"
                placeholder="Ask Loknet anything..." autocomplete="off">
            
            <button id="send-btn" class="w-12 h-12 bg-blue-600 hover:bg-blue-500 rounded-full flex items-center justify-center text-white transition-colors flex-shrink-0 shadow-lg">
                <i class="fa-solid fa-paper-plane text-[15px] ml-[-2px]"></i>
            </button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Firebase (Optional)
        let db = null;
        try {
            const app = initializeApp({ apiKey: "TEST", databaseURL: "TEST", projectId: "TEST" });
            db = getDatabase(app);
        } catch(e) {}

        // IMPORTANT: Replace this key if it's giving the "trouble connecting" error!
        const GEMINI_API_KEY = "AQ.Ab8RN6LhRUhypdA1f7JQGG6L2IiljCcUVp-EhJ-wNWbYN0YpCA";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const fileUpload = document.getElementById('file-upload');
        const previewContainer = document.getElementById('image-preview-container');
        const previewImg = document.getElementById('preview-img');
        
        let selectedImageBase64 = null;
        let selectedImageMimeType = null;

        // Handle Image Selection
        fileUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                selectedImageBase64 = event.target.result.split(',')[1];
                selectedImageMimeType = file.type;
                
                previewImg.src = event.target.result;
                document.getElementById('preview-name').innerText = file.name.substring(0, 15) + '...';
                previewContainer.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('remove-img-btn').addEventListener('click', clearImage);

        function clearImage() {
            selectedImageBase64 = null;
            selectedImageMimeType = null;
            fileUpload.value = '';
            previewContainer.classList.add('hidden');
        }

        function appendMessage(sender, text, imgSrc = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex w-full ${sender === 'user' ? 'justify-end' : 'items-end gap-2'}`;

            let content = '';
            if (imgSrc) {
                content += `<img src="data:${selectedImageMimeType};base64,${selectedImageBase64}" class="w-full max-w-[200px] rounded-lg mb-2 object-cover">`;
            }
            if (text) content += `<div>${sender === 'bot' ? marked.parse(text) : text}</div>`;

            if (sender === 'user') {
                msgDiv.innerHTML = `<div class="user-bubble p-3.5 text-[15px] max-w-[85%] shadow-sm">${content}</div>`;
            } else {
                msgDiv.innerHTML = `
                    <div class="w-7 h-7 rounded-full bg-gray-800 border border-gray-700 flex items-center justify-center flex-shrink-0 mb-1">
                        <i class="fa-solid fa-robot text-blue-400 text-[10px]"></i>
                    </div>
                    <div class="bot-bubble p-3.5 text-[15px] text-gray-200 max-w-[85%] shadow-sm markdown-content">${content}</div>
                `;
            }
            chatBox.appendChild(msgDiv);
            window.scrollTo(0, document.body.scrollHeight);
        }

        function showTyping() {
            const id = 'typing-' + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.id = id;
            typingDiv.className = 'flex items-end gap-2 w-full';
            typingDiv.innerHTML = `
                <div class="w-7 h-7 rounded-full bg-gray-800 border border-gray-700 flex items-center justify-center flex-shrink-0 mb-1">
                    <i class="fa-solid fa-bolt text-gray-400 text-[10px]"></i>
                </div>
                <div class="bot-bubble p-4 shadow-sm h-[46px] flex items-center">
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>
            `;
            chatBox.appendChild(typingDiv);
            window.scrollTo(0, document.body.scrollHeight);
            return id;
        }

        async function fetchLoknetResponse(userText) {
            let parts = [];
            
            // Text Prompt Add chestunnam
            parts.push({ 
                text: `You are Loknet, a highly advanced AI. Never say you are Gemini or Google. User: ${userText}` 
            });

            // Image unte Image data kooda add chestunnam
            if (selectedImageBase64) {
                parts.push({
                    inline_data: {
                        mime_type: selectedImageMimeType,
                        data: selectedImageBase64
                    }
                });
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: parts }] })
                });

                if (!response.ok) {
                    console.error("API Error Response:", await response.text());
                    throw new Error('API Request Failed - Check API Key');
                }
                
                const data = await response.json();
                let aiResponse = data.candidates[0].content.parts[0].text;
                return aiResponse.replace(/Gemini/gi, 'Loknet').replace(/Google/gi, 'Loknet Labs');
            } catch (error) {
                return "Error connecting to servers. Please verify your API Key quota or internet connection.";
            }
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text && !selectedImageBase64) return;

            appendMessage('user', text, selectedImageBase64);
            userInput.value = '';
            
            const typingId = showTyping();
            
            // Need to save image data before clearing it
            const currentImgBase64 = selectedImageBase64;
            clearImage(); 

            const aiResponse = await fetchLoknetResponse(text);

            document.getElementById(typingId).remove();
            appendMessage('bot', aiResponse);
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

    </script>
</body>
</html>
