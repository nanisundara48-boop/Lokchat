<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loknet | AI Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* Force clean font */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111827; /* Tailwind gray-900 */
            color: #f3f4f6;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Clean scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }

        /* Modern Chat Bubbles */
        .bot-bubble {
            background-color: #1f2937; /* gray-800 */
            border: 1px solid #374151;
            border-radius: 16px 16px 16px 4px;
        }
        .user-bubble {
            background-color: #2563eb; /* blue-600 */
            color: white;
            border-radius: 16px 16px 4px 16px;
        }

        /* Smooth Typing Animation */
        .typing-dots span {
            display: inline-block; width: 6px; height: 6px; 
            background-color: #9ca3af; border-radius: 50%; margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* Markdown formatting inside chat */
        .markdown-content p { margin-bottom: 0.5rem; line-height: 1.5; }
        .markdown-content p:last-child { margin-bottom: 0; }
        .markdown-content strong { color: #60a5fa; font-weight: 600; }
        .markdown-content code { background: #111827; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; color: #a78bfa;}
        .markdown-content pre { background: #030712; padding: 12px; border-radius: 8px; overflow-x: auto; margin-top: 8px;}
    </style>
</head>
<body>

    <header class="bg-[#1f2937] border-b border-gray-800 px-4 py-3 flex items-center justify-between sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i class="fa-solid fa-bolt text-white text-sm"></i>
            </div>
            <div>
                <h1 class="font-semibold text-base tracking-wide text-white">Loknet AI</h1>
                <p class="text-[11px] text-green-400 flex items-center gap-1 font-medium">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-500 inline-block animate-pulse"></span> Secure Connection
                </p>
            </div>
        </div>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-5 pb-24 w-full max-w-3xl mx-auto">
        <div class="flex items-end gap-2 w-full">
            <div class="w-7 h-7 rounded-full bg-gray-800 border border-gray-700 flex items-center justify-center flex-shrink-0 mb-1">
                <i class="fa-solid fa-robot text-blue-400 text-[10px]"></i>
            </div>
            <div class="bot-bubble p-3.5 text-[15px] text-gray-200 max-w-[85%] shadow-sm">
                Hello! I am Loknet. I am online and ready to help you.
            </div>
        </div>
    </main>

    <footer class="bg-[#1f2937] border-t border-gray-800 p-3 fixed bottom-0 w-full">
        <div class="max-w-3xl mx-auto relative flex items-center gap-2">
            <input type="text" id="user-input" 
                class="flex-1 bg-[#374151] text-white text-[15px] rounded-full py-3 px-5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all placeholder-gray-400"
                placeholder="Ask Loknet anything..." autocomplete="off">
            
            <button id="send-btn" class="w-12 h-12 bg-blue-600 hover:bg-blue-500 rounded-full flex items-center justify-center text-white transition-colors flex-shrink-0 shadow-lg active:scale-95">
                <i class="fa-solid fa-paper-plane text-[15px] ml-[-2px]"></i>
            </button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // ==========================================
        // 1. FIREBASE SETUP (With Safe Degradation)
        // ==========================================
        let db = null;
        try {
            const firebaseConfig = {
                apiKey: "YOUR_FIREBASE_API_KEY",
                databaseURL: "YOUR_TRUECHAT_DATABASE_URL",
                projectId: "YOUR_PROJECT_ID"
            };
            const app = initializeApp(firebaseConfig);
            db = getDatabase(app);
            console.log("Firebase Connected");
        } catch (error) {
            console.warn("Firebase config missing or failed. Chat will still work, but won't save to DB.");
        }

        const ENCRYPTION_KEY = "Loknet_Secure_Key_2026";
        function encryptData(text) {
            return CryptoJS.AES.encrypt(text, ENCRYPTION_KEY).toString();
        }

        // ==========================================
        // 2. GEMINI API SETUP
        // ==========================================
        const GEMINI_API_KEY = "AIzaSyDe0HS5hGITIJ93V2x4fXumDhIfPTRvO9c";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

        // ==========================================
        // 3. UI LOGIC
        // ==========================================
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex w-full ${sender === 'user' ? 'justify-end' : 'items-end gap-2'}`;

            if (sender === 'user') {
                msgDiv.innerHTML = `
                    <div class="user-bubble p-3.5 text-[15px] max-w-[85%] shadow-sm">
                        ${text}
                    </div>
                `;
            } else {
                const parsedText = marked.parse(text);
                msgDiv.innerHTML = `
                    <div class="w-7 h-7 rounded-full bg-gray-800 border border-gray-700 flex items-center justify-center flex-shrink-0 mb-1">
                        <i class="fa-solid fa-robot text-blue-400 text-[10px]"></i>
                    </div>
                    <div class="bot-bubble p-3.5 text-[15px] text-gray-200 max-w-[85%] shadow-sm markdown-content">
                        ${parsedText}
                    </div>
                `;
            }
            chatBox.appendChild(msgDiv);
            window.scrollTo(0, document.body.scrollHeight);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTyping() {
            const id = 'typing-' + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.id = id;
            typingDiv.className = 'flex items-end gap-2 w-full';
            typingDiv.innerHTML = `
                <div class="w-7 h-7 rounded-full bg-gray-800 border border-gray-700 flex items-center justify-center flex-shrink-0 mb-1">
                    <i class="fa-solid fa-bolt text-gray-400 text-[10px]"></i>
                </div>
                <div class="bot-bubble p-4 max-w-[85%] shadow-sm flex items-center h-[46px]">
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>
            `;
            chatBox.appendChild(typingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        async function fetchLoknetResponse(userText) {
            if (userText.toLowerCase().trim() === "hey loknet") {
                return "Hello there! I am Loknet. How can I assist you today?";
            }

            const systemPrompt = `You are Loknet, a highly advanced AI assistant. Never say you are Gemini or Google. Give brief, natural answers. User query: ${userText}`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: systemPrompt }] }] })
                });

                if (!response.ok) throw new Error('API Request Failed');
                const data = await response.json();
                let aiResponse = data.candidates[0].content.parts[0].text;
                return aiResponse.replace(/Gemini/gi, 'Loknet').replace(/Google/gi, 'Loknet Labs');
            } catch (error) {
                return "I'm having trouble connecting to my servers right now. Please try again.";
            }
        }

        // ==========================================
        // 4. EVENT HANDLERS (No Reloads!)
        // ==========================================
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Show User Text
            appendMessage('user', text);
            userInput.value = '';

            // 2. Save to DB (If Firebase works)
            if (db) {
                try {
                    push(ref(db, 'loknet_chats'), {
                        sender: 'user', message: encryptData(text), timestamp: Date.now()
                    });
                } catch(e) {}
            }

            // 3. Show Loading
            const typingId = showTyping();

            // 4. Get Response
            const aiResponse = await fetchLoknetResponse(text);

            // 5. Remove Loading & Show AI Text
            document.getElementById(typingId).remove();
            appendMessage('bot', aiResponse);

            // 6. Save AI Response to DB
            if (db) {
                try {
                    push(ref(db, 'loknet_chats'), {
                        sender: 'loknet', message: encryptData(aiResponse), timestamp: Date.now()
                    });
                } catch(e) {}
            }
        }

        // Click Send Button
        sendBtn.addEventListener('click', handleSend);

        // Press Enter Key
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault(); // Prevents any accidental form-like behavior
                handleSend();
            }
        });

    </script>
</body>
</html>
